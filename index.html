<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christ Temple International Ministry</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colors matching the provided mockup */
            --primary-accent: #C83B2B; /* Reddish orange */
            --bg-light: #FDFBF8; /* Off-white for nav */
            --text-dark: #2A2A2A;
            --text-light: #FFFFFF;
            
            /* Typography */
            --font-sans: 'Outfit', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-light);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 4rem;
            background-color: var(--bg-light);
            position: relative;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo-container {
            height: 42px;
            display: flex;
            align-items: center;
        }

        .logo-container img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .nav-divider {
            width: 1px;
            height: 24px;
            background-color: var(--primary-accent);
            opacity: 0.3;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--primary-accent);
        }

        .nav-actions .btn-outline {
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(200, 59, 43, 0.3);
            border-radius: 50px;
            color: var(--primary-accent);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-actions .btn-outline:hover {
            background-color: var(--primary-accent);
            color: var(--text-light);
            border-color: var(--primary-accent);
        }

        /* --- Hero Section --- */
        .hero {
            position: relative;
            height: calc(100vh - 82px); /* Adjust based on navbar height */
            min-height: 700px;
            display: flex;
            padding: 5rem 4rem;
            background-image: url('pexels-caleboquendo-34612562.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Overlay for the background image */
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            /* Gradient to make text readable at bottom, and general darkening */
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.1) 0%,
                rgba(0, 0, 0, 0.4) 50%,
                rgba(0, 0, 0, 0.85) 100%
            );
            z-index: 1;
        }

        .hero-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100%;
        }

        .hero-content {
            max-width: 800px;
            animation: fadeUp 1s ease-out forwards;
        }

        .hero-title {
            color: var(--text-light);
            font-size: 4.5rem;
            line-height: 1.1;
            font-weight: 400;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .hero-title .serif-italic {
            font-family: var(--font-serif);
            font-style: italic;
            font-weight: 400;
        }

        .hero-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            max-width: 600px;
            font-weight: 300;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--primary-accent);
            color: var(--text-light);
            border: 1px solid var(--primary-accent);
        }

        .btn-primary:hover {
            background-color: #A83224;
            border-color: #A83224;
            transform: translateY(-2px);
        }

        .btn-primary .arrow {
            transition: transform 0.3s ease;
        }

        .btn-primary:hover .arrow {
            transform: translateX(4px);
        }

        .btn-ghost {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-ghost:hover {
            border-color: var(--text-light);
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* --- Stats Section --- */
        .hero-stats {
            position: absolute;
            bottom: 1rem;
            right: 0;
            display: flex;
            gap: 3.5rem;
            animation: fadeIn 1.5s ease-out forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center; /* Centered like in the mockup */
            color: var(--text-light);
            text-align: center;
        }

        .stat-number {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            line-height: 1;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: capitalize;
            letter-spacing: 0.02em;
            color: rgba(255, 255, 255, 0.7);
        }

        /* --- Animations --- */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- Responsive Design --- */
        @media (max-width: 1024px) {
            .navbar {
                padding: 1rem 2rem;
            }
            .nav-left {
                gap: 1.5rem;
            }
            .hero {
                padding: 4rem 2rem;
            }
            .hero-title {
                font-size: 3.5rem;
            }
            .hero-stats {
                gap: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .nav-menu, .nav-divider, .nav-actions {
                display: none; /* Hide on mobile for now */
            }
            .hero {
                height: auto;
                min-height: 100vh;
            }
            .hero-container {
                justify-content: center;
                padding-top: 2rem;
            }
            .hero-title {
                font-size: 2.75rem;
            }
            .hero-stats {
                position: relative;
                bottom: auto;
                right: auto;
                margin-top: 3rem;
                flex-wrap: wrap;
                gap: 2rem;
                justify-content: flex-start;
            }
            .stat-item {
                align-items: flex-start;
                text-align: left;
            }
            .hero-buttons {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo-container">
                <img src="Christ Temple logo.svg" alt="Christ Temple International Ministry">
            </div>
            <div class="nav-divider"></div>
            <ul class="nav-menu">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">About us</a></li>
                <li><a href="#">Messages</a></li>
                <li><a href="#">Visit</a></li>
                <li><a href="#">Contact us</a></li>
            </ul>
        </div>

        <div class="nav-actions">
            <a href="#" class="btn-outline">Donate us</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-container">
            
            <div class="hero-content">
                <h1 class="hero-title">
                    Connecting You to <br>
                    <span class="serif-italic">Faith, Community, & Hope</span>
                </h1>
                
                <p class="hero-subtitle">
                    Discover a welcoming community, inspiring sermons, <br>
                    and ways to connect and grow in faith.
                </p>
                
                <div class="hero-buttons">
                    <a href="#" class="btn btn-primary">
                        Visit Church <span class="arrow">&rarr;</span>
                    </a>
                    <a href="#" class="btn btn-ghost">
                        Watch Sermons
                    </a>
                </div>
            </div>

            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number">1985</span>
                    <span class="stat-label">Founded</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">250+</span>
                    <span class="stat-label">Sermons Available</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">24/7</span>
                    <span class="stat-label">Prayer Support</span>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
